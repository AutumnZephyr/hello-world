<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Homer's Web Page</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        background-color: #7ec8e3;
        overflow: hidden;
        height: 100vh;
        width: 100vw;
        font-family: Impact, "Arial Black", sans-serif;
      }

      h1 {
        text-align: center;
        font-size: 64px;
        color: #111;
        padding: 16px 0 0 0;
        letter-spacing: 1px;
        text-shadow: 3px 3px 0px rgba(0,0,0,0.15);
      }

      .scene {
        position: relative;
        width: 100%;
        height: calc(100vh - 90px);
      }

      /* ── Center spinning figure ── */
      .homer {
        position: absolute;
        top: 50%;
        left: 50%;
        transform-origin: center center;
        animation: spin 2.5s linear infinite;
        user-select: none;
        filter: drop-shadow(3px 3px 6px rgba(0,0,0,0.35));
      }

      @keyframes spin {
        from { transform: translate(-50%, -50%) rotate(0deg); }
        to   { transform: translate(-50%, -50%) rotate(360deg); }
      }

      /* ── Floating objects ── */
      .item {
        position: absolute;
        font-size: 52px;
        user-select: none;
        animation-name: wobble;
        animation-timing-function: ease-in-out;
        animation-iteration-count: infinite;
        animation-direction: alternate;
        filter: drop-shadow(1px 1px 3px rgba(0,0,0,0.2));
      }

      @keyframes wobble {
        0%   { transform: translate(0px, 0px)   rotate(-8deg) scale(1.0); }
        30%  { transform: translate(4px, -5px)  rotate(5deg)  scale(1.05); }
        60%  { transform: translate(-5px, 3px)  rotate(-4deg) scale(0.97); }
        100% { transform: translate(3px, -3px)  rotate(9deg)  scale(1.03); }
      }

      /* Slightly different wobble for variety */
      @keyframes wobble2 {
        0%   { transform: translate(0px, 0px)   rotate(6deg)  scale(1.02); }
        40%  { transform: translate(-6px, 4px)  rotate(-7deg) scale(0.96); }
        70%  { transform: translate(5px, -4px)  rotate(4deg)  scale(1.04); }
        100% { transform: translate(-3px, 3px)  rotate(-9deg) scale(0.99); }
      }

      @keyframes wobble3 {
        0%   { transform: translate(2px, -2px)  rotate(-5deg) scale(1.0);  }
        50%  { transform: translate(-4px, 5px)  rotate(8deg)  scale(1.06); }
        100% { transform: translate(4px, -4px)  rotate(-6deg) scale(0.95); }
      }

      .w2 { animation-name: wobble2; }
      .w3 { animation-name: wobble3; }

      /* ── Individual positions & timings ── */
      .i1  { top: 8%;  left: 10%; animation-duration: 0.55s; }
      .i2  { top: 30%; left: 4%;  animation-duration: 0.45s; }
      .i3  { top: 50%; left: 7%;  animation-duration: 0.60s; }
      .i4  { top: 68%; left: 3%;  animation-duration: 0.50s; }
      .i5  { top: 82%; left: 12%; animation-duration: 0.40s; }
      .i6  { top: 90%; left: 28%; animation-duration: 0.65s; }
      .i7  { top: 75%; left: 42%; animation-duration: 0.48s; }
      .i8  { top: 85%; left: 58%; animation-duration: 0.55s; }
      .i9  { top: 72%; left: 72%; animation-duration: 0.42s; }
      .i10 { top: 82%; left: 84%; animation-duration: 0.58s; }
      .i11 { top: 55%; left: 88%; animation-duration: 0.47s; }
      .i12 { top: 35%; left: 85%; animation-duration: 0.62s; }
      .i13 { top: 15%; left: 80%; animation-duration: 0.44s; }
      .i14 { top: 10%; left: 55%; animation-duration: 0.53s; }
      .i15 { top: 20%; left: 28%; animation-duration: 0.49s; }
      .i16 { top: 38%; left: 20%; animation-duration: 0.57s; }
    </style>
  </head>
  <body>

    <h1>Homer's Web Page</h1>

    <div class="scene">

      <!-- Center spinning Homer-Jesus -->
      <div class="homer">
        <svg viewBox="-60 -125 120 245" width="130" height="260" xmlns="http://www.w3.org/2000/svg">

          <!-- Robe body -->
          <polygon points="0,-50 -32,-44 -40,72 40,72 32,-44" fill="white" stroke="#ccc" stroke-width="1.5"/>
          <!-- Robe fold lines -->
          <line x1="0" y1="-44" x2="-8" y2="72" stroke="#ddd" stroke-width="1"/>
          <line x1="0" y1="-44" x2="10" y2="72" stroke="#ddd" stroke-width="1"/>

          <!-- Left arm extended sideways -->
          <line x1="-30" y1="-28" x2="-56" y2="-8" stroke="white" stroke-width="11" stroke-linecap="round"/>
          <!-- Left hand (yellow) -->
          <circle cx="-56" cy="-8" r="9" fill="#FFD700"/>

          <!-- Right arm raised high -->
          <line x1="28" y1="-30" x2="48" y2="-82" stroke="#FFD700" stroke-width="9" stroke-linecap="round"/>
          <!-- Right hand -->
          <circle cx="48" cy="-82" r="8" fill="#FFD700"/>
          <!-- Dagger handle -->
          <rect x="44" y="-115" width="8" height="10" rx="2" fill="#8B4513"/>
          <!-- Dagger guard (crosspiece) -->
          <rect x="39" y="-107" width="18" height="4" rx="2" fill="#888"/>
          <!-- Dagger blade -->
          <polygon points="48,-106 51,-85 45,-85" fill="#c0c0c0"/>
          <polygon points="48,-115 51,-106 45,-106" fill="#e0e0e0"/>

          <!-- Head (yellow, Simpsons) -->
          <circle cx="0" cy="-80" r="27" fill="#FFD700"/>

          <!-- Hair (dark, Homer-style side fringe) -->
          <path d="M-22,-88 Q-28,-112 -6,-108 Q0,-118 6,-108 Q28,-112 22,-88" fill="#2c1f10"/>
          <!-- Homer's signature hair curl -->
          <path d="M18,-94 Q30,-105 22,-88" fill="none" stroke="#2c1f10" stroke-width="4" stroke-linecap="round"/>

          <!-- Beard (Jesus-style, dark brown) -->
          <ellipse cx="0" cy="-60" rx="21" ry="16" fill="#3d2b1f"/>
          <!-- Beard point -->
          <polygon points="-10,-52 10,-52 0,-38" fill="#3d2b1f"/>
          <!-- Moustache -->
          <ellipse cx="-7" cy="-68" rx="8" ry="4" fill="#2c1f10"/>
          <ellipse cx="7" cy="-68" rx="8" ry="4" fill="#2c1f10"/>

          <!-- Eyes -->
          <circle cx="-9" cy="-83" r="4" fill="white"/>
          <circle cx="9" cy="-83" r="4" fill="white"/>
          <circle cx="-9" cy="-83" r="2.5" fill="#222"/>
          <circle cx="9" cy="-83" r="2.5" fill="#222"/>

          <!-- Sandals (yellow-gold) -->
          <ellipse cx="-14" cy="76" rx="16" ry="8" fill="#c8960c"/>
          <ellipse cx="14" cy="76" rx="16" ry="8" fill="#c8960c"/>
          <!-- Sandal straps -->
          <line x1="-20" y1="73" x2="-8" y2="68" stroke="#8B6914" stroke-width="2.5"/>
          <line x1="-14" y1="71" x2="-14" y2="65" stroke="#8B6914" stroke-width="2.5"/>
          <line x1="8" y1="68" x2="20" y2="73" stroke="#8B6914" stroke-width="2.5"/>
          <line x1="14" y1="71" x2="14" y2="65" stroke="#8B6914" stroke-width="2.5"/>

        </svg>
      </div>

      <!-- Scattered objects -->
      <div class="item i1 w2">⏰</div>
      <div class="item i2 w3">🪱</div>
      <div class="item i3">👄</div>
      <div class="item i4 w2">🍞</div>
      <div class="item i5 w3">🔔</div>
      <div class="item i6">🪱</div>
      <div class="item i7 w2">⏰</div>
      <div class="item i8 w3">🍞</div>
      <div class="item i9">🪱</div>
      <div class="item i10 w2">⏰</div>
      <div class="item i11 w3">🔔</div>
      <div class="item i12">👄</div>
      <div class="item i13 w2">🍞</div>
      <div class="item i14 w3">⏰</div>
      <div class="item i15">👄</div>
      <div class="item i16 w2">🪱</div>

    </div>

  </body>
</html>
