<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello World</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background-color: #f0f4f8;
        transition: background-color 0.5s;
      }

      .card {
        text-align: center;
        background: white;
        padding: 60px 80px;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      }

      h1 {
        font-size: 48px;
        color: #1a202c;
        margin: 0 0 12px 0;
        transition: color 0.3s;
      }

      p {
        font-size: 18px;
        color: #718096;
        margin: 0 0 32px 0;
      }

      button {
        background-color: #4a90e2;
        color: white;
        border: none;
        padding: 14px 32px;
        font-size: 16px;
        border-radius: 8px;
        cursor: pointer;
        transition: background-color 0.2s, transform 0.1s;
      }

      button:hover {
        background-color: #357abd;
      }

      button:active {
        transform: scale(0.97);
      }

      .counter {
        margin-top: 20px;
        font-size: 14px;
        color: #a0aec0;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1 id="greeting">Hello, World!</h1>
      <p id="subtitle">Welcome to my first webpage, Jay.</p>
      <button id="btn" onclick="changeGreeting()">Click me</button>
      <div class="counter" id="counter">Clicked 0 times</div>
    </div>

    <script>
      const greetings = [
        { text: "Hello, World!", color: "#1a202c", bg: "#f0f4f8" },
        { text: "Bonjour, Monde!", color: "#2b6cb0", bg: "#ebf8ff" },
        { text: "Hola, Mundo!", color: "#276749", bg: "#f0fff4" },
        { text: "Ciao, Mondo!", color: "#744210", bg: "#fffff0" },
        { text: "こんにちは!", color: "#702459", bg: "#fff5f7" },
      ];

      let clickCount = 0;
      let currentIndex = 0;

      function changeGreeting() {
        clickCount++;
        currentIndex = (currentIndex + 1) % greetings.length;

        const next = greetings[currentIndex];

        document.getElementById("greeting").textContent = next.text;
        document.getElementById("greeting").style.color = next.color;
        document.body.style.backgroundColor = next.bg;
        document.getElementById("counter").textContent =
          `Clicked ${clickCount} time${clickCount === 1 ? "" : "s"}`;
      }
    </script>
  </body>
</html>
